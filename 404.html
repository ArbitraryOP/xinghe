<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#08080f" />
  <title>404 · 漂出星图 — 星河</title>
  <style>
    /* 404 页完全自包含：不引用任何外部样式与脚本 */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      background: #08080f;
      color: #e8e6f0;
      font-family: "Inter", "Noto Serif SC", "PingFang SC", "Microsoft YaHei", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* 纯 CSS 星星点缀 */
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #fff;
      opacity: .6;
      animation: twinkle 3s ease-in-out infinite;
    }
    .star.s1 { top: 18%; left: 22%; animation-delay: 0s; }
    .star.s2 { top: 32%; left: 74%; animation-delay: .8s; }
    .star.s3 { top: 64%; left: 14%; animation-delay: 1.4s; width: 3px; height: 3px; }
    .star.s4 { top: 78%; left: 62%; animation-delay: 2s; }
    .star.s5 { top: 12%; left: 56%; animation-delay: 1.1s; }
    .star.s6 { top: 52%; left: 86%; animation-delay: .4s; width: 3px; height: 3px; }
    .star.s7 { top: 86%; left: 36%; animation-delay: 1.7s; }

    @keyframes twinkle {
      0%, 100% { opacity: .15; }
      50%      { opacity: .8; }
    }

    .wrap {
      position: relative;
      padding: 2rem;
    }

    .mark {
      display: inline-block;
      font-size: 1.6rem;
      background: linear-gradient(135deg, #b18cff, #6ee7ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: drift 6s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .code {
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: .04em;
      background: linear-gradient(135deg, #b18cff, #6ee7ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .line {
      margin-top: 1rem;
      font-size: .95rem;
      letter-spacing: .08em;
      color: rgba(232, 230, 240, .55);
    }

    .back {
      display: inline-block;
      margin-top: 2.4rem;
      padding: .85rem 2.2rem;
      border: 1px solid rgba(177, 140, 255, .45);
      border-radius: 999px;
      color: #e8e6f0;
      text-decoration: none;
      font-size: .9rem;
      letter-spacing: .12em;
      background: rgba(177, 140, 255, .08);
      transition: background .3s ease, border-color .3s ease, transform .3s ease;
    }
    .back:hover {
      background: rgba(177, 140, 255, .18);
      border-color: rgba(110, 231, 255, .6);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <!-- 星星点缀 -->
  <span class="star s1"></span>
  <span class="star s2"></span>
  <span class="star s3"></span>
  <span class="star s4"></span>
  <span class="star s5"></span>
  <span class="star s6"></span>
  <span class="star s7"></span>

  <div class="wrap">
    <span class="mark">◆</span>
    <div class="code">404</div>
    <p class="line">你漂出了已知星图 · You have drifted beyond the charted stars</p>
    <a class="back" href="/xinghe/">返回星河 ↩</a>
  </div>

</body>
</html>
